# Sandbag spritesheet target spec.
#
# This spec is informational. The sandbag is a code-driven target: see
# ambition_sprite2d_renderer/targets/sandbag.py for the canonical row /
# pose definitions.
target: sandbag
frame_width: 128
frame_height: 128
label_width: 100
animations:
  - { name: idle,  frames: 6, duration_ms: 120 }
  - { name: hit,   frames: 4, duration_ms: 75 }
  - { name: death, frames: 7, duration_ms: 112 }
runtime_alias_policy: missing_animations_resolve_to_idle
notes: >
  Sparse sheet. The runtime resolves missing animations (walk, run, slash,
  jump, fall, blink_out, blink_in, dash) to idle at load time, so the sheet
  does not need alias rows.
