target: robot
name: player_robot
output_name: player_robot
seed: 7
archetype: player_compact
animations:
- idle
- walk
- run
- jump
- fall
- slash
- hit
- death
- blink_out
- blink_in
- dash
- hover
- ledge_grab
- dash_startup
- land_hard
- land_recovery
- wall_grab
- ledge_climb
- ledge_getup
- float_glide
- attack_side
- attack_up
- attack_down
- air_neutral
- air_forward
- air_back
- air_down
- air_up
- ledge_roll
- ledge_getup_attack
# Newly requested rows for actions the player can already perform but
# previously fell back to Idle / Jump / WallGrab. The renderer's
# robot_side.py defines all of these poses; pick_player_anim now routes
# the underlying ECS state (body_mode, env_contact, dodge, shield).
- crouch
- crouch_walk     # rendered as the crawl pose
- slide
- climb           # ladder climb (distinct from wall_grab)
- swim
- block           # shield-up bubble pose
- roll            # dodge roll (distinct from ledge_roll)
- wall_jump       # push-off pose (currently falls back to jump)
- shoot           # projectile fire (needs shoot_anim_timer wiring)
- aim             # held projectile charge (needs aim flag wiring)
- charge          # held heavy-attack wind-up
- interact        # talk / open / pickup gesture
render:
  frame_width: 128
  frame_height: 128
  single_width: 128
  single_height: 128
  supersample: 3
  downsample: lanczos
  background: transparent
  sheet_background: transparent
  border: 0
  label_width: 100
actor:
  character_id: player
  display_name: Player Robot
visual:
  default_pose: idle
body:
  body_plan: HumanoidBiped
  body_kind: Standard
  mass_class: Medium
  traits:
  - robot
  - player
  locomotion_hint: Walk
capabilities:
  traversal:
    walk: true
    jump:
      height_px: 42.0
      distance_px: 82.0
      source: explicit.profile.robot
    climb: null
    fly: null
    swim: null
    crawl: null
    use_lifts: true
    door_access:
    - public
  interactions:
    talk: true
    trade: null
    carry: null
    open_doors:
    - public
brain:
  default_preset: player
actions:
  default_preset: player_default
animation_bindings:
  default:
    animation: idle
    events: []
  locomotion.walk:
    animation: walk
    events: []
  locomotion.run:
    animation: run
    events: []
  action.melee.primary:
    animation: slash
    events:
    - t: 0.35
      event: hitbox_active_start
      source: explicit.profile.robot
    - t: 0.55
      event: hitbox_active_end
      source: explicit.profile.robot
  action.ranged.primary:
    animation: shoot
    events:
    - t: 0.5
      event: projectile_release
      source: explicit.profile.robot
sockets:
  head:
    source: explicit.profile.robot
    point:
      x: 64.0
      y: 24.0
  chest:
    source: explicit.profile.robot
    point:
      x: 64.0
      y: 54.0
  hand_l:
    source: explicit.profile.robot
    point:
      x: 48.0
      y: 64.0
  hand_r:
    source: explicit.profile.robot
    point:
      x: 80.0
      y: 64.0
  muzzle:
    source: explicit.profile.robot
    point:
      x: 90.0
      y: 58.0
  projectile_origin:
    source: explicit.profile.robot
    point:
      x: 90.0
      y: 58.0
tags:
- robot
- player
