title: Music-Faction Leader Sprite Lineup
notes: >-
  Review-only character lineup keyed to music cues that already exist in
  tools/ambition_music_renderer. This is a transitional spec: it keeps per-
  character YAML jobs working, but gives faction/lair art a data-driven shape
  similar to the music renderer.
default_animations: [idle, walk, talk, interact, celebrate, hit, death]
default_render:
  frame_width: 128
  frame_height: 128
  single_width: 128
  single_height: 128
  supersample: 2
  downsample: lanczos
  background: transparent
  sheet_background: transparent
  border: 0
  label_width: 120
  crop: true
  crop_padding: 2
factions:
  - id: goblin_cantina
    display_name: Goblin Cantina
    music_cue: first_goblin_tune_v2
    music_source: tools/ambition_music_renderer/scores/active/first_goblin_tune_v2.music.yaml
    palette_hint: rowdy green / brass / tavern-banner oranges
    lair_hook: first combat lair, noisy training pit, boss goblin host
    characters:
      - id: goblin_cantina_chieftain
        display_name: Fretjaw, Cantina Chieftain
        target: goblin
        archetype: chieftain_bard
        held_item: hammer
        role: leader
        seed: 42024093
        animations: [idle, walk, talk, slash, celebrate, hit, death]
        notes: Leader for the faction currently represented by first_goblin_tune_v2.
